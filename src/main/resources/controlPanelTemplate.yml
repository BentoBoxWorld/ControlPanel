# Control Panel Template file
# Command Parser Values:
#    [player] - [player] in command will be replaced with username,
#               f.e. 'give [player] diamond' will result in '/give BONNe1704 diamond'
#    [server] - Command will be run by console, f.e. '[server] op [player]' will result in '/op BONNe1704'
#    [label]  - [label] in command will be replaced with corresponding GameMode user command,
#               f.e. '[label] challenges' in BSkyblock will result in 'island challenges'
# Command types:
#    command             - Executed on left click (default click action)
#    right_click_command - Executed on right click. Falls back to 'command' if not set.
#    shift_click_command - Executed on shift+left click. Falls back to 'command' if not set.
# material is used from Material.match
# icon is used by parsing BentoBox ItemParser. Replacement for material.
# permission is a suffix that will be added to the end of "[gamemode].controlpanel.panel.[suffix]".
#    Adding permission means that user will open control panel defined by permission.
#    If user will have multiple panel permissions, it will open first encountered with default flag.
#    If user will have '*', it will open first defined panel with default flag.
# description can include color codes using & and new lines using | and placeholders with with % at the
#    start and the end. [gamemode] in placeholders will be converted to correct string.
# number before each button means slot location

panel-list:
  default:
    defaultPanel: true
    panelName: '&0&l Control Panel'
    permission: 'default'
    buttons:
      0:
        name: '&f&l Island'
        material: GRASS_BLOCK
        icon: minecraft:grass_block
        description: |-
          &7 Go to your island'
        command: '[label] go'
      8:
        name: '&f&l Settings'
        material: ANVIL
        icon: minecraft:anvil
        description: |-
          &7 Open your island settings
        command: '[label] settings'
      3:
        name: '&f&l Team'
        material: PLAYER_HEAD
        icon: minecraft:player_head
        description: |-
          &7 List team members
        command: '[label] team'
      1:
        name: '&f&l Set Home'
        material: WHITE_BED
        icon: minecraft:white_bed
        description: |-
          &7 Set your home here
        command: '[label] sethome'
      9:
        name: '&f&l Calculate Level'
        material: ACACIA_STAIRS
        icon: minecraft:acacia_stairs
        description: |-
          &7 Island level
          &7 Level: &5 %Level_[gamemode]_island_level%
        command: '[label] level'
      10:
        name: '&f&l Show top 10'
        material: BOOK
        icon: minecraft:book
        description: |-
          &7 Open top 10 islands
        command: '[label] top'
      12:
        name: '&f&l Show warps'
        material: OAK_SIGN
        icon: minecraft:oak_sign
        description: |-
          &7 List warps available
        command: '[label] warps'
      5:
        name: '&f&l Spawn'
        material: BEDROCK
        icon: minecraft:bedrock
        description: |-
          &7 Go to world spawn
        command: '[label] spawn'
      14:
        name: '&f&l Biomes'
        material: OAK_SAPLING
        icon: minecraft:oak_sapling
        description: |-
          &7 Change biome
        command: '[label] biomes'
      15:
        name: '&f&l Challenges'
        material: ENCHANTING_TABLE
        icon: minecraft:enchanting_table
        description: |-
          &7 Open challenges
        command: '[label] challenges'