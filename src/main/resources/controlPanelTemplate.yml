# Control Panel template
#
# Command placeholders:
#   [player] -> replaced with the player's username.
#     Example: 'give [player] diamond' becomes '/give BONNe1704 diamond'
#   [server] -> run the command as console.
#     Example: '[server] op [player]' becomes '/op BONNe1704'
#   [label] -> replaced with the active GameMode user command label.
#     Example: '[label] challenges' in BSkyBlock becomes 'island challenges'
#
# Button fields:
#   material   - resolved with Material.match.
#   icon       - resolved with BentoBox ItemParser (used instead of material when valid).
#   permission - suffix appended to "[gamemode].controlpanel.panel.[suffix]".
#                A player opens the panel matching their permission.
#                If multiple panels match, the first panel marked defaultPanel: true is used.
#                If the player has '*', the first defined default panel is used.
#   description - supports color codes with '&', multi-line text with '|', and placeholders wrapped
#                 with '%' (for example %Level_[gamemode]_island_level%).
#                 '[gamemode]' inside placeholders is converted to the active GameMode string.
#
# Each number before a button entry is its slot index.

panel-list:
  default:
    defaultPanel: true
    panelName: '&0&l Control Panel'
    permission: 'default'
    buttons:
      0:
        name: '&f&l Island'
        material: GRASS_BLOCK
        icon: minecraft:grass_block
        description: |-
          &7 Go to your island'
        command: '[label] go'
      8:
        name: '&f&l Settings'
        material: ANVIL
        icon: minecraft:anvil
        description: |-
          &7 Open your island settings
        command: '[label] settings'
      3:
        name: '&f&l Team'
        material: PLAYER_HEAD
        icon: minecraft:player_head
        description: |-
          &7 List team members
        command: '[label] team'
      1:
        name: '&f&l Set Home'
        material: WHITE_BED
        icon: minecraft:white_bed
        description: |-
          &7 Set your home here
        command: '[label] sethome'
      9:
        name: '&f&l Calculate Level'
        material: ACACIA_STAIRS
        icon: minecraft:acacia_stairs
        description: |-
          &7 Island level
          &7 Level: &5 %Level_[gamemode]_island_level%
        command: '[label] level'
      10:
        name: '&f&l Show top 10'
        material: BOOK
        icon: minecraft:book
        description: |-
          &7 Open top 10 islands
        command: '[label] top'
      12:
        name: '&f&l Show warps'
        material: OAK_SIGN
        icon: minecraft:oak_sign
        description: |-
          &7 List warps available
        command: '[label] warps'
      5:
        name: '&f&l Spawn'
        material: BEDROCK
        icon: minecraft:bedrock
        description: |-
          &7 Go to world spawn
        command: '[label] spawn'
      14:
        name: '&f&l Biomes'
        material: OAK_SAPLING
        icon: minecraft:oak_sapling
        description: |-
          &7 Change biome
        command: '[label] biomes'
      15:
        name: '&f&l Challenges'
        material: ENCHANTING_TABLE
        icon: minecraft:enchanting_table
        description: |-
          &7 Open challenges
        command: '[label] challenges'